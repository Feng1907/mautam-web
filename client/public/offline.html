<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mất kết nối | Mẫu Tâm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 2.5rem 2rem;
      border-radius: 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      opacity: 0.7;
    }
    .cross {
      font-size: 1.5rem;
      color: #D4AF37;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 1.75rem;
    }
    button {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: #8B0000;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #a00000; }
    .brand {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #475569;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="cross">✝</div>
    <div class="icon">📡</div>
    <h1>Mất kết nối mạng</h1>
    <p>
      Trang này cần kết nối internet để tải nội dung.<br />
      Vui lòng kiểm tra mạng và thử lại.
    </p>
    <button onclick="window.location.reload()">Thử lại</button>
    <div class="brand">Xứ Đoàn Anrê Phú Yên – Mẫu Tâm</div>
  </div>
</body>
</html>
