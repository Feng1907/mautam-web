name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ─── 1. Server unit tests (in-memory MongoDB via mongodb-memory-server) ────────
  server-unit:
    name: Server — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server
        env:
          JWT_SECRET: ci-test-secret

  # ─── 2. Client lint + unit tests + build ──────────────────────────────────────
  client:
    name: Client — lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - name: Lint
        run: npm run lint
        working-directory: client
      - name: Unit tests
        run: npm test
        working-directory: client
      - name: Build
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: ''

  # ─── 3. Integration — real server + MongoDB service container ─────────────────
  #
  # Starts the Express app against a real MongoDB, waits for /api/health,
  # then runs the supertest integration suite (promotion.test.mjs, etc.).
  #
  integration:
    name: Server — integration tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Make wait-for-server executable
        run: chmod +x scripts/wait-for-server.sh

      - name: Start server in background
        run: node index.js &
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/mautam-integration-test
          JWT_SECRET: ci-integration-secret
          CLIENT_URL: http://localhost:5173

      - name: Wait for server to be ready
        run: ./scripts/wait-for-server.sh http://localhost:5000/api/health 60

      - name: Run integration tests
        run: npm run test:integration
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/mautam-integration-test
          JWT_SECRET: ci-integration-secret
          BASE_URL: http://localhost:5000
